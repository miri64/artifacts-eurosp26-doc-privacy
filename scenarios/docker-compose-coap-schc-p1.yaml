include:
  - networks/database_backend.yaml
  - networks/wpan_simulation.yaml
  - networks/upstream.yaml

name: coap-schc-p1

services:
  db:
    extends:
      file: database/database.yaml
      service: db-base
  coap-server-global:
    extends:
      file: coap/coap_server.yaml
      service: coap-server-base
    networks:
      upstream:
        aliases:
          - dns-server
          # need to trick docker-compose to use the hostname over this network instead of
          # database_backend
          - coap-server
    environment:
      BIND_PREFIX: "${UPSTREAM_PREFIX}"
      SERVER_CREDENTIALS: "${DATA_SERVER_CREDENTIALS:-}"
      NETWORK_SCENARIO: "coap-schc-p1"
      SERVER_NAME: "server"
    depends_on:
      db:
        condition: service_healthy
  coap-proxy-global:
    extends:
      file: coap/coap_proxy.yaml
      service: coap-proxy-base
    networks:
    - upstream
    - wpan_simulation
    environment:
      BIND_PREFIX: "${SCHC_PREFIX}"
      NETWORK_SCENARIO: "coap-schc-p1"
      WPAN_SIMULATION_IFACE: "${WPAN_SIMULATION_IFACE}"
      SCHC_IP_ADDR: "${SCHC_PREFIX}1/${SCHC_PREFIX_LEN}"
      SCHC_PEER_ADDRS: "${SCHC_PREFIX}3/${SCHC_PREFIX_LEN}"
    depends_on:
      coap-server-global:
        condition: service_started
    volumes:
      - schc_route:/schc/route/
  coap-client:
    extends:
      file: coap/coap_client.yaml
      service: coap-client-base
    depends_on:
      sniffer-wpan:
        condition: service_started
    extra_hosts:
      - "coap-proxy=${SCHC_PREFIX}1"
    environment:
      CLIENT_PROXY_CREDENTIALS: "${CLIENT_PROXY_CREDENTIALS:-}"
      PROXY: "coap-proxy"
      COAP_SERVER: "coap-server"
      DNS_SERVER: "coap-server"
      NETWORK_SCENARIO: "coap-schc-p1"
      SCHC_IP_ADDR: "${SCHC_PREFIX}3/${SCHC_PREFIX_LEN}"
      SCHC_PEER_ADDRS: "${SCHC_PREFIX}1/${SCHC_PREFIX_LEN}"
    volumes:
      - schc_route:/schc/route/
  sniffer-wpan:
    extends:
      file: sniffer/sniffer.yaml
      service: sniffer-base
    environment:
      SNIFFER_IFACE: "${WPAN_SIMULATION_IFACE}"
      SNIFFER_LOGNAME: wpan
      SNIFFER_FILTER: "ether proto ${SCHC_ETHERTYPE:-0x88b5}"
      NETWORK_SCENARIO: "coap-schc-p1"
    depends_on:
      coap-proxy-global:
        condition: service_started
  sniffer-upstream:
    extends:
      file: sniffer/sniffer.yaml
      service: sniffer-base
    environment:
      SNIFFER_IFACE: "${UPSTREAM_IFACE}"
      SNIFFER_LOGNAME: upstream
      SNIFFER_FILTER: "udp port 5683 or udp port 5684"
      NETWORK_SCENARIO: "coap-schc-p1"
    depends_on:
      coap-server-global:
        condition: service_started

volumes:
  schc_route:
