include:
  - ../networks/database_backend.yaml

services:
  coap-server-base:
    extends:
      file: coap.yaml
      service: coap-base
    networks:
      - database_backend
    volumes:
      - ../../jsons:/jsons
    environment:
      SERVER_CREDENTIALS: "${SERVER_CREDENTIALS:-}"
      DATA_FORMAT: "${DATA_FORMAT}"
      DNS_FORMAT: "${DNS_FORMAT}"
      DATABASE_FILE: "${DATABASE_FILE}"
      AIOCOAP_DTLSSERVER_ENABLED: "yes"
    command: |
      /app/coap/coap_server.sh
