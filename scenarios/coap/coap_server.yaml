include:
  - ../networks/database_backend.yaml

services:
  coap-server-base:
    extends:
      file: coap.yaml
      service: coap-base
    networks:
      - database_backend
    volumes:
      - ../../jsons:/jsons
      - ../../output_dataset:/dumps
    environment:
      BLOCK_SIZE: "${BLOCK_SIZE:-}"
      SECURITY: "${SECURITY:-}"
      DATA_FORMAT: "${DATA_FORMAT}"
      DNS_FORMAT: "${DNS_FORMAT}"
      DATABASE_URI: "${DATABASE_URI}"
      WPAN_SIMULATION_PREFIX: "${WPAN_SIMULATION_PREFIX}"
      SCHC_IP_ADDR: "${SCHC_IP_ADDR:-}"
      SCHC_PEER_ADDRS: "${SCHC_PEER_ADDRS:-}"
      AIOCOAP_DTLSSERVER_ENABLED: "yes"
    cap_add:    # required for tun for SCHC
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun
    command: |
      /app/coap/coap_server.sh
