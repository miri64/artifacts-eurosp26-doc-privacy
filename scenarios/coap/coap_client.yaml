include:
  - ../networks/database_backend.yaml
  - ../networks/wpan_simulation.yaml

services:
  coap-client-base:
    extends:
      file: coap.yaml
      service: coap-base
    networks:
      - database_backend
      - wpan_simulation
    volumes:
      - ../../jsons:/jsons
      - ../../output_dataset:/dumps
    environment:
      BLOCK_SIZE: "${BLOCK_SIZE:-}"
      SECURITY: "${SECURITY:-}"
      CLIENT_CREDENTIALS: "${CLIENT_CREDENTIALS:-}"
      DATA_FORMAT: "${DATA_FORMAT}"
      DNS_FORMAT: "${DNS_FORMAT}"
      DATABASE_URI: "${DATABASE_URI}"
      UPSTREAM_PREFIX: "${UPSTREAM_PREFIX}"
      WPAN_SIMULATION_PREFIX: "${WPAN_SIMULATION_PREFIX}"
      SCHC_DEV_ADDR: "${SCHC_DEV_ADDR:-}"
      SCHC_IP_ADDR: "${SCHC_IP_ADDR:-}"
    cap_add:    # required for tun for SCHC
      - NET_ADMIN
    devices:
      - /dev/net/tun
    command: |
      /app/coap/coap_client.sh
