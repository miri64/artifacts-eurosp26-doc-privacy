include:
  - ../networks/database_backend.yaml

services:
  coap-proxy-base:
    extends:
      file: coap.yaml
      service: coap-base
    networks:
      - database_backend
    volumes:
      - ../../jsons:/jsons
      - ../../output_dataset:/dumps
    environment:
      BLOCK_SIZE: "${BLOCK_SIZE:-}"
      SECURITY: "${SECURITY:-}"
      PROXY_CREDENTIALS: "${PROXY_CREDENTIALS:-}"
      DATABASE_URI: "${DATABASE_URI}"
      DATA_FORMAT: "${DATA_FORMAT}"
      DNS_FORMAT: "${DNS_FORMAT}"
      AIOCOAP_DTLSSERVER_ENABLED: "yes"
    command: |
      /app/coap/coap_proxy.sh
