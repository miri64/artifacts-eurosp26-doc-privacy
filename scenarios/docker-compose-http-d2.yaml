include:
  - networks/database_backend.yaml
  - networks/wpan_simulation.yaml

name: http-d2

services:
  db:
    extends:
      file: database/database.yaml
      service: db-base
  http-server-global:
    extends:
      file: http/http_server.yaml
      service: http-server-base
    networks:
      wpan_simulation:
        aliases:
          # need to trick docker-compose to use the hostname over this network instead of
          # database_backend
          - http-server
    environment:
      BIND_PREFIX: "${WPAN_SIMULATION_PREFIX}"
      SERVER_CREDENTIALS: "${DATA_SERVER_CREDENTIALS:-}"
      NETWORK_SCENARIO: "http-d2"
      SERVER_NAME: "http-server"
    depends_on:
      db:
        condition: service_healthy
  dns-server-global:
    extends:
      file: http/http_server.yaml
      service: http-server-base
    networks:
      wpan_simulation:
        aliases:
          # need to trick docker-compose to use the hostname over this network instead of
          # database_backend
          - dns-server
    environment:
      BIND_PREFIX: "${WPAN_SIMULATION_PREFIX}"
      SERVER_CREDENTIALS: "${DNS_SERVER_CREDENTIALS:-}"
      NETWORK_SCENARIO: "http-d2"
      SERVER_NAME: "dns-server"
    depends_on:
      db:
        condition: service_healthy
  http-client:
    extends:
      file: http/http_client.yaml
      service: http-client-base
    depends_on:
      sniffer:
        condition: service_started
    environment:
      COAP_SERVER: "http-server"
      DNS_SERVER: "dns-server"
      NETWORK_SCENARIO: "http-d2"
  sniffer:
    extends:
      file: sniffer/sniffer.yaml
      service: sniffer-base
    environment:
      SNIFFER_IFACE: "${WPAN_SIMULATION_IFACE}"
      SNIFFER_LOGNAME: wpan
      SNIFFER_FILTER: "tcp port 443"
      NETWORK_SCENARIO: "http-d2"
    depends_on:
      http-server-global:
        condition: service_started
      dns-server-global:
        condition: service_started
