services:
  jupyter:
    build:
      args:
        HOST_GID: "${HOST_GID}"
        HOST_UID: "${HOST_UID}"
      context: .
      dockerfile: Dockerfile
    image: pivot-eval/jupyter
    volumes:
      - .:/app
    environment:
      JUPYTER_PORT: ${JUPYTER_PORT:-8888}"
    network_mode: host
    command: |
      bash -c "usermod -u '${HOST_UID:-1000}' -g '${HOST_GID:-1000}' user;
      chown 'user:' /home/user /home/user/.bash* /home/user/.profile; chown -R 'user:' /home/user/.config;
      su - user -c \"cd /app; jupyter lab --port ${JUPYTER_PORT:-8888}\""
