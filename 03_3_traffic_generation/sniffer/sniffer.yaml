services:
  sniffer-base:
    build:
      args:
        HOST_GID: "${HOST_GID}"
        HOST_UID: "${HOST_UID}"
      context: .
      dockerfile: Dockerfile
    image: miri64/eurosp26-sniffer
    volumes:
      # use absolute path for docker-in-docker
      - "${EVAL_BASE_DIR:-../..}/output_dataset:/dumps/"
      - "${EVAL_BASE_DIR:-../..}/03_3_traffic_generation/sniffer/:/app"
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      DATA_FORMAT: "${DATA_FORMAT}"
      DNS_FORMAT: "${DNS_FORMAT}"
      BLOCK_SIZE: "${BLOCK_SIZE:-}"
      SECURITY: "${SECURITY:-}"
      SCHC_RULES_MODE: "${SCHC_RULES_MODE:-}"
    command: |
      /app/sniffer.sh
    healthcheck:
      test: ["CMD", "pgrep", "tcpdump"]
      interval: 10m
      timeout: 10s
      retries: 60
      start_period: 5m
      start_interval: 1s
